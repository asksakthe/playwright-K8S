apiVersion: apps/v1
kind: Deployment
metadata:
  name: registration-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.registration.replicas }}
  selector:
    matchLabels:
      app: registration-service
  template:
    metadata:
      labels:
        app: registration-service
    spec:
      containers:
      - name: registration-service
        image: {{ .Values.registration.image }}
        ports:
        - containerPort: {{ .Values.registration.port }}
        command: ["python", "-m", "http.server", "5000"]
        envFrom:
        - configMapRef:
            name: student-config
        - secretRef:
            name: student-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: registration-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: registration-service
  ports:
  - port: {{ .Values.registration.port }}
    targetPort: {{ .Values.registration.port }}