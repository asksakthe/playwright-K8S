apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-parallel
  labels:
    app: playwright-parallel
spec:
  completions: 2
  parallelism: 2
  ttlSecondsAfterFinished: 300
  template:
    spec:
      initContainers:
      - name: get-index
        image: busybox
        command:
        - sh
        - -c
        - echo $JOB_COMPLETION_INDEX > /shared/index.txt
        env:
        - name: JOB_COMPLETION_INDEX
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
        volumeMounts:
        - name: shared
          mountPath: /shared
      containers:
      - name: playwright-tests
        image: pwframeworkacr.azurecr.io/playwright-tests:latest
        command:
        - sh
        - -c
        - |
          INDEX=$(cat /shared/index.txt)
          if [ "$INDEX" = "0" ]; then
            pytest -m smoke -v
          else
            pytest -m regression -v
          fi
        envFrom:
        - configMapRef:
            name: playwright-config
        - secretRef:
            name: playwright-secrets
        volumeMounts:
        - name: shared
          mountPath: /shared
      restartPolicy: Never
      volumes:
      - name: shared
        emptyDir: {}
  backoffLimit: 1